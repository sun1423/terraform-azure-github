name: Terraform

on:
   workflow_dispatch: 
    
jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: hashicorp/setup-terraform@v2

      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

     # - run: terraform init
     # - run: terraform apply -auto-approve
      - run: terraform destroy -auto-approve 
